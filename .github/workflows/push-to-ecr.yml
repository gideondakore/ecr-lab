name: Build and Push Docker Image to ECR

on:
  push:

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ecr-push-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: ecr-lab-app
  IMAGE_TAG: gideondakore_ecr-lab-app
  LOCAL_IMAGE: ecr-lab-app:ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ecr-lab

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker build --tag "${LOCAL_IMAGE}" ./app

      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 8080:8080 "${LOCAL_IMAGE}"
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/health; then break; fi
            [ "$i" -eq 10 ] && { docker logs smoke; exit 1; }
            sleep 2
          done
          docker stop smoke

      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          docker tag "${LOCAL_IMAGE}" "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker tag "${LOCAL_IMAGE}" "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}-${GITHUB_SHA::7}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}-${GITHUB_SHA::7}"
          echo "Pushed ${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
