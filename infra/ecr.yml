AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Private ECR repository for the ecr-lab application. Enables image scanning
  on push, AES-256 encryption at rest, and a lifecycle policy that expires
  untagged images and caps the number of stored CI images.

Parameters:
  RepositoryName:
    Type: String
    Default: ecr-lab-app-v2
    Description: Name of the ECR repository.

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Ref RepositoryName
      # Mutable because the pipeline re-pushes the stable
      # "gideondakore_ecr-lab-app" tag on every main build.
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep only the 5 most recent SHA-suffixed CI images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["gideondakore_ecr-lab-app-"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: ecr-lab
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Owner
          Value: gideondakore

Outputs:
  RepositoryUri:
    Description: URI of the ECR repository.
    Value: !GetAtt EcrRepository.RepositoryUri
  RepositoryArn:
    Description: ARN of the ECR repository.
    Value: !GetAtt EcrRepository.Arn
